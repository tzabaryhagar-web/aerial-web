# Deploy static site to GitHub Pages (https://tzabaryhagar-web.github.io/aerial-web/)
name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download Git LFS files
        run: git lfs pull

      - name: Prepare site directory
        run: |
          mkdir -p _site
          cp index.html styles.css script.js videos-data.js .nojekyll _site/
          cp -r assets _site/assets
          ls -la _site
          ls -la _site/assets/images
          ls -la _site/assets/videos

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
